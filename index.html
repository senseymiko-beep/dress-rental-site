<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гардероб — аренда платьев</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F7F2EC;
    --ink: #2A2320;
    --plum: #4B2E3A;
    --rose: #C98A9E;
    --gold: #AD8A50;
    --line: #E4DACD;
    --card-bg: #FFFFFF;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--ivory);
    color: var(--ink);
    font-family: 'Manrope', sans-serif;
    line-height: 1.5;
  }

  h1, h2, h3, .display {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    letter-spacing: -0.01em;
  }

  /* ---------- HEADER ---------- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    background: rgba(247, 242, 236, 0.92);
    backdrop-filter: blur(6px);
    z-index: 100;
  }

  .logo {
    font-family: 'Fraunces', serif;
    font-size: 22px;
    font-weight: 600;
    color: var(--plum);
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--rose); }

  #auth-area { display: flex; align-items: center; gap: 12px; }

  .user-chip {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 100px;
    padding: 6px 14px 6px 6px;
    font-size: 14px;
  }

  .user-chip img {
    width: 26px; height: 26px; border-radius: 50%; object-fit: cover;
  }

  .btn {
    font-family: 'Manrope', sans-serif;
    font-weight: 600;
    font-size: 14px;
    padding: 10px 20px;
    border-radius: 100px;
    border: none;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.15s ease;
  }

  .btn-primary { background: var(--plum); color: var(--ivory); }
  .btn-primary:hover { background: #3a2330; transform: translateY(-1px); }

  .btn-ghost { background: transparent; color: var(--plum); border: 1px solid var(--plum); }
  .btn-ghost:hover { background: var(--plum); color: var(--ivory); }

  /* ---------- HERO ---------- */
  .hero {
    padding: 72px 32px 56px;
    max-width: 1100px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1.1fr 0.9fr;
    gap: 48px;
    align-items: center;
  }

  .hero h1 {
    font-size: clamp(34px, 5vw, 56px);
    line-height: 1.05;
    color: var(--plum);
  }

  .hero p.lead {
    margin-top: 18px;
    font-size: 17px;
    max-width: 46ch;
    color: #5a4f49;
  }

  .hero-actions { margin-top: 28px; display: flex; gap: 12px; flex-wrap: wrap; }

  /* signature element: hanging rail */
  .rail {
    position: relative;
    height: 260px;
  }
  .rail::before {
    content: "";
    position: absolute;
    top: 18px; left: 0; right: 0;
    height: 3px;
    background: var(--gold);
    border-radius: 3px;
  }
  .rail .hanger {
    position: absolute;
    top: 0;
    width: 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: sway 5s ease-in-out infinite;
  }
  .rail .hanger:nth-child(1) { left: 4%; animation-delay: 0s; }
  .rail .hanger:nth-child(2) { left: 26%; animation-delay: 0.6s; }
  .rail .hanger:nth-child(3) { left: 48%; animation-delay: 1.1s; }
  .rail .hanger:nth-child(4) { left: 70%; animation-delay: 0.3s; }
  .rail .hanger .hook {
    width: 2px; height: 16px; background: var(--gold);
  }
  .rail .hanger .dress {
    width: 60px;
    height: 150px;
    border-radius: 30px 30px 50px 50px / 24px 24px 90px 90px;
    margin-top: -2px;
  }
  .rail .hanger:nth-child(1) .dress { background: var(--rose); }
  .rail .hanger:nth-child(2) .dress { background: var(--plum); }
  .rail .hanger:nth-child(3) .dress { background: #D9C2A8; }
  .rail .hanger:nth-child(4) .dress { background: #8C6E7A; }

  @keyframes sway {
    0%, 100% { transform: rotate(-2deg); }
    50% { transform: rotate(2deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .rail .hanger { animation: none; }
  }

  /* ---------- FILTERS ---------- */
  .filters {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px 24px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filters select, .filters input {
    font-family: 'Manrope', sans-serif;
    font-size: 14px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--card-bg);
    color: var(--ink);
  }

  /* ---------- CATALOG ---------- */
  .catalog {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 32px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 22px;
  }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--line);
    border-radius: 16px;
    overflow: hidden;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    cursor: pointer;
  }
  .card:hover { transform: translateY(-3px); box-shadow: 0 12px 24px rgba(43,35,32,0.08); }

  .card .thumb {
    aspect-ratio: 3/4;
    background: linear-gradient(135deg, #E4DACD, #F0E7DB);
    display: flex; align-items: center; justify-content: center;
    color: #a89a89;
    font-size: 13px;
  }
  .card .thumb img { width: 100%; height: 100%; object-fit: cover; }

  .card .info { padding: 14px 16px 16px; }
  .card .title { font-family: 'Fraunces', serif; font-size: 16px; color: var(--plum); }
  .card .meta { font-size: 13px; color: #8a7d74; margin-top: 4px; }
  .card .price { font-weight: 700; margin-top: 10px; font-size: 15px; }
  .card .price span { font-weight: 400; color: #8a7d74; font-size: 13px; }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: #8a7d74;
  }

  /* ---------- MODAL ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(43,35,32,0.45);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--card-bg);
    border-radius: 18px;
    max-width: 460px;
    width: 100%;
    max-height: 88vh;
    overflow-y: auto;
    padding: 28px;
  }

  .modal h2 { color: var(--plum); font-size: 22px; margin-bottom: 6px; }
  .modal .close { float: right; cursor: pointer; font-size: 20px; color: #8a7d74; }

  .field { margin-top: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #5a4f49; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px; border-radius: 10px;
    border: 1px solid var(--line); font-family: 'Manrope', sans-serif; font-size: 14px;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .modal .actions { margin-top: 22px; display: flex; gap: 10px; }

  .status-msg { font-size: 13px; margin-top: 10px; padding: 10px 12px; border-radius: 8px; }
  .status-msg.error { background: #FBEAEA; color: #A33A3A; }
  .status-msg.ok { background: #E9F3E7; color: #3A6B33; }

  footer {
    text-align: center;
    padding: 28px;
    font-size: 13px;
    color: #a89a89;
    border-top: 1px solid var(--line);
  }

  @media (max-width: 760px) {
    .hero { grid-template-columns: 1fr; padding-top: 40px; }
    .rail { display: none; }
    header { padding: 16px 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Гардероб<span>.</span></div>
  <div id="auth-area">
    <div id="telegram-login-container"></div>
  </div>
</header>

<section class="hero">
  <div>
    <h1>Одно платье —<br>сто важных вечеров</h1>
    <p class="lead">Арендуй наряд на своё событие или сдавай своё в аренду, пока оно висит без дела. Никаких затрат на платье, которое наденешь один раз.</p>
    <div class="hero-actions">
      <button class="btn btn-primary" onclick="document.getElementById('catalog').scrollIntoView({behavior:'smooth'})">Смотреть каталог</button>
      <button class="btn btn-ghost" id="add-dress-btn">Сдать своё платье</button>
    </div>
  </div>
  <div class="rail">
    <div class="hanger"><div class="hook"></div><div class="dress"></div></div>
    <div class="hanger"><div class="hook"></div><div class="dress"></div></div>
    <div class="hanger"><div class="hook"></div><div class="dress"></div></div>
    <div class="hanger"><div class="hook"></div><div class="dress"></div></div>
  </div>
</section>

<div class="filters">
  <select id="filter-city">
    <option value="">Все города</option>
    <option value="Алматы">Алматы</option>
    <option value="Актобе">Актобе</option>
    <option value="Астана">Астана</option>
    <option value="Шымкент">Шымкент</option>
  </select>
  <select id="filter-occasion">
    <option value="">Любой повод</option>
    <option value="Свадьба">Свадьба</option>
    <option value="Выпускной">Выпускной</option>
    <option value="Фотосессия">Фотосессия</option>
    <option value="Вечеринка">Вечеринка</option>
  </select>
  <input type="number" id="filter-price" placeholder="Цена до, ₸">
  <button class="btn btn-ghost" onclick="loadCatalog()">Применить</button>
</div>

<div class="catalog" id="catalog">
  <div class="empty-state">Загружаем платья…</div>
</div>

<footer>Гардероб — сервис аренды платьев в Казахстане</footer>

<!-- Модалка: карточка платья / бронирование -->
<div class="overlay" id="dress-overlay">
  <div class="modal">
    <span class="close" onclick="closeModal('dress-overlay')">✕</span>
    <div id="dress-modal-content"></div>
  </div>
</div>

<!-- Модалка: добавить платье -->
<div class="overlay" id="add-overlay">
  <div class="modal">
    <span class="close" onclick="closeModal('add-overlay')">✕</span>
    <h2>Сдать платье в аренду</h2>
    <div id="add-dress-form">
      <div class="field">
        <label>Название</label>
        <input type="text" id="f-title" placeholder="Вечернее платье с открытой спиной">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Бренд</label>
          <input type="text" id="f-brand" placeholder="Zara, без бренда...">
        </div>
        <div class="field">
          <label>Размер</label>
          <input type="text" id="f-size" placeholder="42-44">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Город</label>
          <input type="text" id="f-city" placeholder="Алматы">
        </div>
        <div class="field">
          <label>Повод</label>
          <select id="f-occasion">
            <option>Свадьба</option>
            <option>Выпускной</option>
            <option>Фотосессия</option>
            <option>Вечеринка</option>
          </select>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Цена за 1 день, ₸</label>
          <input type="number" id="f-price1">
        </div>
        <div class="field">
          <label>Цена за 3 дня, ₸</label>
          <input type="number" id="f-price3">
        </div>
      </div>
      <div class="field">
        <label>Залог, ₸</label>
        <input type="number" id="f-deposit" value="0">
      </div>
      <div class="field">
        <label>Описание</label>
        <textarea id="f-description" placeholder="Состояние, ткань, особенности посадки..."></textarea>
      </div>
      <div class="field">
        <label>Фото (до 5 штук)</label>
        <input type="file" id="f-photos" accept="image/*" multiple>
      </div>
      <div class="field">
        <label>Видео-разворот (до 15 секунд)</label>
        <input type="file" id="f-video" accept="video/*">
        <div id="video-warning" style="font-size:12px; color:#A33A3A; margin-top:6px;"></div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="submit-dress-btn" onclick="submitDress()">Отправить на модерацию</button>
      </div>
      <div id="add-status"></div>
    </div>
  </div>
</div>

<script>
  // ==== НАСТРОЙКИ: впиши сюда адрес своего API с Railway ====
  const API_BASE = "https://dress-rental-api-production.up.railway.app";
  const TELEGRAM_BOT_USERNAME = "dressrentkz_bot";

  const CLOUDINARY_CLOUD_NAME = "rf1r05uz";
  const CLOUDINARY_UPLOAD_PRESET = "y2bfmndr";

  // Проверяет длительность видео перед загрузкой — не даём загрузить длиннее 15 сек
  function checkVideoDuration(file) {
    return new Promise((resolve, reject) => {
      const video = document.createElement("video");
      video.preload = "metadata";
      video.onloadedmetadata = () => {
        URL.revokeObjectURL(video.src);
        if (video.duration > 15) {
          reject(new Error(`Видео длиной ${Math.round(video.duration)} сек — максимум 15 секунд`));
        } else {
          resolve();
        }
      };
      video.src = URL.createObjectURL(file);
    });
  }

  async function uploadToCloudinary(file, resourceType) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);

    const res = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`,
      { method: "POST", body: formData }
    );
    if (!res.ok) throw new Error("Не удалось загрузить файл в Cloudinary");
    const data = await res.json();
    return data.secure_url;
  }

  let authToken = localStorage.getItem("auth_token") || null;
  let currentUserId = localStorage.getItem("user_id") || null;
  let dressesCache = [];

  // ---------- Telegram Login ----------
  function renderTelegramWidget() {
    const container = document.getElementById("telegram-login-container");
    if (authToken) {
      container.innerHTML = `
        <div class="user-chip">
          <span>Вы вошли</span>
        </div>
        <button class="btn btn-ghost" onclick="logout()" style="margin-left:8px;">Выйти</button>
      `;
      return;
    }
    const script = document.createElement("script");
    script.src = "https://telegram.org/js/telegram-widget.js?22";
    script.setAttribute("data-telegram-login", TELEGRAM_BOT_USERNAME);
    script.setAttribute("data-size", "medium");
    script.setAttribute("data-onauth", "onTelegramAuth(user)");
    script.setAttribute("data-request-access", "write");
    script.async = true;
    container.innerHTML = "";
    container.appendChild(script);
  }

  async function onTelegramAuth(user) {
    try {
      const res = await fetch(`${API_BASE}/auth/telegram-login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(user)
      });
      if (!res.ok) throw new Error("Ошибка входа");
      const data = await res.json();
      authToken = data.access_token;
      currentUserId = data.user_id;
      localStorage.setItem("auth_token", authToken);
      localStorage.setItem("user_id", currentUserId);
      renderTelegramWidget();
    } catch (e) {
      alert("Не удалось войти через Telegram: " + e.message);
    }
  }

  function logout() {
    authToken = null;
    currentUserId = null;
    localStorage.removeItem("auth_token");
    localStorage.removeItem("user_id");
    renderTelegramWidget();
  }

  // ---------- Каталог ----------
  async function loadCatalog() {
    const catalog = document.getElementById("catalog");
    catalog.innerHTML = `<div class="empty-state">Загружаем платья…</div>`;

    const city = document.getElementById("filter-city").value;
    const occasion = document.getElementById("filter-occasion").value;
    const priceMax = document.getElementById("filter-price").value;

    const params = new URLSearchParams();
    if (city) params.append("city", city);
    if (occasion) params.append("occasion", occasion);
    if (priceMax) params.append("price_max", priceMax);

    try {
      const res = await fetch(`${API_BASE}/dresses?${params.toString()}`);
      if (!res.ok) throw new Error("Сервер недоступен");
      const dresses = await res.json();
      dressesCache = dresses;
      renderCatalog(dresses);
    } catch (e) {
      catalog.innerHTML = `<div class="empty-state">Не получилось загрузить каталог.<br>${e.message}</div>`;
    }
  }

  function renderCatalog(dresses) {
    const catalog = document.getElementById("catalog");
    if (!dresses.length) {
      catalog.innerHTML = `<div class="empty-state">Пока нет платьев по этим фильтрам.<br>Попробуй сдать своё — будешь первым в каталоге.</div>`;
      return;
    }
    catalog.innerHTML = dresses.map(d => `
      <div class="card" onclick="openDress(${d.id})">
        <div class="thumb">
          ${d.photo_urls && d.photo_urls[0] ? `<img src="${d.photo_urls[0]}">` : "Фото скоро"}
        </div>
        <div class="info">
          <div class="title">${d.title}</div>
          <div class="meta">${d.city} · размер ${d.size}</div>
          <div class="price">${d.price_1day.toLocaleString("ru-RU")} ₸ <span>/ день</span></div>
        </div>
      </div>
    `).join("");
  }

  function openDress(id) {
    const d = dressesCache.find(x => x.id === id);
    if (!d) return;
    const content = document.getElementById("dress-modal-content");
    content.innerHTML = `
      <h2>${d.title}</h2>
      <div class="meta" style="margin-bottom:14px;">${d.brand || "Без бренда"} · размер ${d.size} · ${d.city}</div>
      <p>${d.description || ""}</p>
      <div class="field-row" style="margin-top:16px;">
        <div class="field">
          <label>Дата с</label>
          <input type="date" id="booking-from">
        </div>
        <div class="field">
          <label>Дата по</label>
          <input type="date" id="booking-to">
        </div>
      </div>
      <div class="actions">
        <button class="btn btn-primary" onclick="createBooking(${d.id})">Забронировать</button>
      </div>
      <div id="booking-status"></div>
    `;
    document.getElementById("dress-overlay").classList.add("open");
  }

  async function createBooking(dressId) {
    if (!authToken) {
      alert("Сначала войди через Telegram — кнопка вверху страницы");
      return;
    }
    const dateFrom = document.getElementById("booking-from").value;
    const dateTo = document.getElementById("booking-to").value;
    const statusEl = document.getElementById("booking-status");

    if (!dateFrom || !dateTo) {
      statusEl.innerHTML = `<div class="status-msg error">Укажи обе даты</div>`;
      return;
    }

    try {
      const res = await fetch(`${API_BASE}/bookings`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${authToken}`
        },
        body: JSON.stringify({ dress_id: dressId, date_from: dateFrom, date_to: dateTo })
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Не получилось забронировать");
      statusEl.innerHTML = `<div class="status-msg ok">Забронировано! Статус: ожидает подтверждения.</div>`;
    } catch (e) {
      statusEl.innerHTML = `<div class="status-msg error">${e.message}</div>`;
    }
  }

  function closeModal(id) {
    document.getElementById(id).classList.remove("open");
  }

  // ---------- Добавление платья ----------
  document.getElementById("add-dress-btn").addEventListener("click", () => {
    if (!authToken) {
      alert("Сначала войди через Telegram — кнопка вверху страницы");
      return;
    }
    document.getElementById("add-overlay").classList.add("open");
  });

  async function submitDress() {
    const statusEl = document.getElementById("add-status");
    const submitBtn = document.getElementById("submit-dress-btn");

    const title = document.getElementById("f-title").value;
    const size = document.getElementById("f-size").value;
    const city = document.getElementById("f-city").value;

    if (!title || !size || !city) {
      statusEl.innerHTML = `<div class="status-msg error">Заполни название, размер и город</div>`;
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Загружаем фото и видео...";
    statusEl.innerHTML = "";

    try {
      // 1. Проверяем и загружаем видео (если есть)
      let videoUrl = null;
      const videoFile = document.getElementById("f-video").files[0];
      if (videoFile) {
        await checkVideoDuration(videoFile);
        videoUrl = await uploadToCloudinary(videoFile, "video");
      }

      // 2. Загружаем фото (до 5 штук)
      const photoFiles = Array.from(document.getElementById("f-photos").files).slice(0, 5);
      const photoUrls = [];
      for (const file of photoFiles) {
        const url = await uploadToCloudinary(file, "image");
        photoUrls.push(url);
      }

      submitBtn.textContent = "Сохраняем...";

      // 3. Создаём платье со ссылками на медиа
      const payload = {
        title,
        brand: document.getElementById("f-brand").value,
        size,
        city,
        occasion: document.getElementById("f-occasion").value,
        price_1day: parseInt(document.getElementById("f-price1").value || "0"),
        price_3day: parseInt(document.getElementById("f-price3").value || "0"),
        deposit: parseInt(document.getElementById("f-deposit").value || "0"),
        description: document.getElementById("f-description").value,
        measurements: {},
        video_url: videoUrl,
        photo_urls: photoUrls
      };

      const res = await fetch(`${API_BASE}/dresses`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${authToken}`
        },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Ошибка отправки");
      statusEl.innerHTML = `<div class="status-msg ok">Платье отправлено на модерацию!</div>`;
    } catch (e) {
      statusEl.innerHTML = `<div class="status-msg error">${e.message}</div>`;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Отправить на модерацию";
    }
  }

  // ---------- Инициализация ----------
  renderTelegramWidget();
  loadCatalog();
</script>

</body>
</html>
