<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Кабинет партнёра — Гардероб</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F7F2EC; --ink: #2A2320; --plum: #4B2E3A; --rose: #C98A9E;
    --gold: #AD8A50; --line: #E4DACD; --card-bg: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--ivory); color: var(--ink); font-family: 'Manrope', sans-serif; line-height: 1.5; }
  h1, h2, h3 { font-family: 'Fraunces', serif; font-weight: 500; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px; border-bottom: 1px solid var(--line);
  }
  .logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--plum); }
  .logo span { color: var(--rose); }
  a.back-link { color: var(--plum); font-size: 14px; text-decoration: none; font-weight: 600; }

  main { max-width: 820px; margin: 0 auto; padding: 40px 24px; }
  h1 { font-size: 26px; color: var(--plum); margin-bottom: 8px; }
  h2 { font-size: 17px; color: var(--plum); margin-top: 32px; margin-bottom: 14px; }
  .subtitle { color: #8a7d74; font-size: 14px; margin-bottom: 20px; }

  .card {
    background: var(--card-bg); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; flex-wrap: wrap;
  }
  .card .title { font-weight: 700; color: var(--plum); font-size: 16px; }
  .card .meta { font-size: 13px; color: #8a7d74; margin-top: 4px; }

  .status-tag { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; }
  .status-tag.pending { background: #FBF3E3; color: #9A7A2E; }
  .status-tag.payment_reported { background: #E3EEF9; color: #2E5A9A; }
  .status-tag.confirmed, .status-tag.picked_up, .status-tag.returned { background: #E9F3E7; color: #3A6B33; }
  .status-tag.cancelled, .status-tag.disputed { background: #FBEAEA; color: #A33A3A; }
  .status-tag.approved { background: #E9F3E7; color: #3A6B33; }
  .status-tag.rejected, .status-tag.archived { background: #F0E7DB; color: #8a7d74; }

  .btn {
    font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 13px;
    padding: 8px 16px; border-radius: 100px; border: none; cursor: pointer;
    text-decoration: none; display: inline-block; margin-top: 8px; margin-right: 8px;
  }
  .btn-primary { background: var(--plum); color: var(--ivory); }
  .btn-whatsapp { background: #25D366; color: white; }
  .btn-telegram { background: #229ED9; color: white; }

  .empty-state { text-align: center; padding: 40px 20px; color: #8a7d74; }

  .overlay.open { display: flex !important; }
  .modal-box {
    background: var(--card-bg); border-radius: 18px; max-width: 480px; width: 100%;
    max-height: 88vh; overflow-y: auto; padding: 28px; position: relative;
  }
  .modal-box h2 { color: var(--plum); font-size: 22px; }
  .modal-box .close { position:absolute; top:20px; right:24px; cursor: pointer; font-size: 20px; color: #8a7d74; }
  .field { margin-top: 14px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #5a4f49; }
  .field input, .field select, .field textarea {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line);
    font-family: 'Manrope', sans-serif; font-size: 14px;
  }
  .field textarea { resize: vertical; min-height: 70px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .actions { margin-top: 22px; }
  .status-msg { font-size: 13px; margin-top: 10px; padding: 10px 12px; border-radius: 8px; }
  .status-msg.error { background: #FBEAEA; color: #A33A3A; }
  .status-msg.ok { background: #E9F3E7; color: #3A6B33; }

  @media (max-width: 760px) {
    header { padding: 14px 16px; }
    main { padding: 24px 16px; }
    h2 { flex-direction: column; align-items: flex-start !important; gap: 10px; }
    .card { flex-direction: column; }
    .field-row { grid-template-columns: 1fr; }
    .overlay { padding: 0; align-items: flex-end; }
    .modal-box { max-width: 100%; width: 100%; border-radius: 14px 14px 0 0; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Гардероб<span>.</span></div>
  <a href="index.html" class="back-link">← На главную</a>
</header>

<main>
  <h1>Кабинет партнёра</h1>
  <p class="subtitle">Твои платья и заказы на них</p>

  <h2 style="display:flex; justify-content:space-between; align-items:center;">
    Мои платья
    <button class="btn btn-primary" onclick="document.getElementById('add-overlay').classList.add('open')" style="margin:0;">+ Добавить платье</button>
  </h2>
  <div id="dresses-list"><div class="empty-state">Загружаем…</div></div>

  <h2>Заказы на мои платья</h2>
  <div id="orders-list"><div class="empty-state">Загружаем…</div></div>
</main>

<!-- Модалка: добавить платье -->
<div class="overlay" id="add-overlay" style="position:fixed; inset:0; background:rgba(43,35,32,0.45); display:none; align-items:center; justify-content:center; z-index:200; padding:20px;">
  <div class="modal-box">
    <span class="close" onclick="document.getElementById('add-overlay').classList.remove('open')">✕</span>
    <h2>Сдать платье в аренду</h2>
    <div>
      <div class="field">
        <label>Название</label>
        <input type="text" id="f-title" placeholder="Вечернее платье с открытой спиной">
      </div>
      <div class="field-row">
        <div class="field">
          <label>Бренд</label>
          <input type="text" id="f-brand" placeholder="Zara, без бренда...">
        </div>
        <div class="field">
          <label>Размер</label>
          <select id="f-size-select" onchange="handleSizeSelectChange()">
            <option value="XS">XS</option>
            <option value="S">S</option>
            <option value="M">M</option>
            <option value="L">L</option>
            <option value="XL">XL</option>
            <option value="XXL">XXL</option>
            <option value="Другой">Свой размер…</option>
          </select>
          <input type="text" id="f-size-custom" placeholder="42-44" style="display:none; margin-top:6px;">
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Город</label>
          <select id="f-city-select" onchange="handleCitySelectChange('f-city-select', 'f-city-custom')">
            <option value="Алматы">Алматы</option>
            <option value="Астана">Астана</option>
            <option value="Актобе">Актобе</option>
            <option value="Шымкент">Шымкент</option>
            <option value="Караганда">Караганда</option>
            <option value="Другой">Другой город…</option>
          </select>
          <input type="text" id="f-city-custom" placeholder="Впиши город" style="display:none; margin-top:6px;">
        </div>
        <div class="field">
          <label>Повод (можно несколько)</label>
          <div style="display:flex; flex-wrap:wrap; gap:8px; margin-top:4px;">
            <label style="display:flex; align-items:center; gap:4px; font-weight:400; font-size:13px;">
              <input type="checkbox" value="Свадьба" class="f-occasion-cb" style="width:auto;"> Свадьба
            </label>
            <label style="display:flex; align-items:center; gap:4px; font-weight:400; font-size:13px;">
              <input type="checkbox" value="Выпускной" class="f-occasion-cb" style="width:auto;"> Выпускной
            </label>
            <label style="display:flex; align-items:center; gap:4px; font-weight:400; font-size:13px;">
              <input type="checkbox" value="Фотосессия" class="f-occasion-cb" style="width:auto;"> Фотосессия
            </label>
            <label style="display:flex; align-items:center; gap:4px; font-weight:400; font-size:13px;">
              <input type="checkbox" value="Вечеринка" class="f-occasion-cb" style="width:auto;"> Вечеринка
            </label>
            <label style="display:flex; align-items:center; gap:4px; font-weight:400; font-size:13px;">
              <input type="checkbox" value="Офис" class="f-occasion-cb" style="width:auto;"> Офис
            </label>
          </div>
        </div>
      </div>
      <div class="field-row">
        <div class="field">
          <label>Цена за 3 дня, ₸</label>
          <input type="number" id="f-price3" placeholder="15000">
        </div>
        <div class="field">
          <label>Цена за неделю, ₸</label>
          <input type="number" id="f-price-week" placeholder="30000">
        </div>
      </div>
      <div class="field">
        <label>Доплата за каждый день сверх недели, ₸</label>
        <input type="number" id="f-extra-day" placeholder="2000" value="0">
      </div>
      <div class="field">
        <label>Залог, ₸ (возвращается арендатору после сдачи платья в порядке)</label>
        <input type="number" id="f-deposit" value="0">
      </div>
      <div class="field">
        <label>Описание</label>
        <textarea id="f-description" placeholder="Состояние, ткань, особенности посадки..."></textarea>
      </div>
      <div class="field">
        <label>Фото (до 5 штук)</label>
        <input type="file" id="f-photos" accept="image/*" multiple>
      </div>
      <div class="field">
        <label>Видео-разворот (до 15 секунд)</label>
        <input type="file" id="f-video" accept="video/*">
      </div>
      <div class="actions">
        <button class="btn btn-primary" id="submit-dress-btn" onclick="submitDress()">Отправить на модерацию</button>
      </div>
      <div id="add-status"></div>
    </div>
  </div>
</div>

<script>
  const API_BASE = "https://dress-rental-api-production.up.railway.app";
  const authToken = localStorage.getItem("auth_token");

  const CLOUDINARY_CLOUD_NAME = "rf1r05uz";
  const CLOUDINARY_UPLOAD_PRESET = "y2bfmndr";

  const STATUS_LABELS = {
    pending: "Ожидает оплаты",
    payment_reported: "Оплата на проверке",
    confirmed: "Подтверждено",
    picked_up: "Платье получено",
    returned: "Платье возвращено",
    disputed: "Спор",
    cancelled: "Отменено"
  };

  const DRESS_STATUS_LABELS = { pending: "На модерации", approved: "Опубликовано", rejected: "Отклонено", archived: "В архиве" };

  function buildMessengerLinks(phone, telegramUsername) {
    let html = "";
    if (phone) {
      const digits = phone.replace(/[^0-9]/g, "");
      html += `<a href="https://wa.me/${digits}" target="_blank" class="btn btn-whatsapp">WhatsApp</a>`;
    }
    if (telegramUsername) {
      html += `<a href="https://t.me/${telegramUsername}" target="_blank" class="btn btn-telegram">Telegram</a>`;
    }
    return html;
  }

  if (!authToken) {
    document.querySelector("main").innerHTML = `
      <div class="empty-state">
        Сначала войди через Telegram на главной странице.<br>
        <a href="index.html" class="btn btn-primary" style="margin-top:14px;">На главную</a>
      </div>
    `;
  } else {
    loadDresses();
    loadOrders();
  }

  async function loadDresses() {
    const container = document.getElementById("dresses-list");
    try {
      const res = await fetch(`${API_BASE}/dresses/mine/list`, {
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      if (!res.ok) throw new Error("Не удалось загрузить платья — заполни анкету партнёра на главной странице, если ещё не подавал");
      const dresses = await res.json();
      if (!dresses.length) {
        container.innerHTML = `<div class="empty-state">У тебя пока нет добавленных платьев.</div>`;
        return;
      }
      container.innerHTML = dresses.map(d => `
        <div class="card">
          <div>
            <div class="title">${d.title}</div>
            <div class="meta">${d.city} · размер ${d.size} · от ${d.price_3day.toLocaleString("ru-RU")} ₸ / 3 дня</div>
          </div>
          <span class="status-tag ${d.status}">${DRESS_STATUS_LABELS[d.status] || d.status}</span>
        </div>
      `).join("");
    } catch (e) {
      container.innerHTML = `<div class="empty-state">${e.message}</div>`;
    }
  }

  async function loadOrders() {
    const container = document.getElementById("orders-list");
    try {
      const res = await fetch(`${API_BASE}/bookings/owner`, {
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      if (!res.ok) throw new Error("Не удалось загрузить заказы");
      const orders = await res.json();
      if (!orders.length) {
        container.innerHTML = `<div class="empty-state">Заказов пока нет.</div>`;
        return;
      }
      // Сначала те, что требуют действия
      const priority = { confirmed: 0, payment_reported: 1, picked_up: 2 };
      orders.sort((a, b) => (priority[a.status] ?? 9) - (priority[b.status] ?? 9));

      container.innerHTML = orders.map(o => `
        <div class="card" id="order-${o.id}">
          <div>
            <div class="title">${o.dress_title}</div>
            <div class="meta">${o.date_from} → ${o.date_to} · ${o.total_price.toLocaleString("ru-RU")} ₸ (комиссия ${o.commission_amount.toLocaleString("ru-RU")} ₸)</div>
            <div class="meta">Арендатор: ${o.renter_name || "—"} · ${o.renter_phone || ""}</div>
            <div style="margin-top:6px;">${buildMessengerLinks(o.renter_phone, o.renter_telegram_username)}</div>
            <span class="status-tag ${o.status}" style="margin-top:6px; display:inline-block;">${STATUS_LABELS[o.status] || o.status}</span>
            <div>
              ${o.status === "confirmed" ? `<button class="btn btn-primary" onclick="updateOrderStatus(${o.id}, 'picked_up')">Отметить: платье выдано</button>` : ""}
              ${o.status === "picked_up" ? `<button class="btn btn-primary" onclick="updateOrderStatus(${o.id}, 'returned')">Отметить: платье возвращено</button>` : ""}
            </div>
          </div>
        </div>
      `).join("");
    } catch (e) {
      container.innerHTML = `<div class="empty-state">${e.message}</div>`;
    }
  }

  async function updateOrderStatus(bookingId, newStatus) {
    try {
      const res = await fetch(`${API_BASE}/bookings/${bookingId}/status?new_status=${newStatus}`, {
        method: "PATCH",
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      if (!res.ok) throw new Error("Не получилось обновить статус");
      loadOrders();
    } catch (e) {
      alert(e.message);
    }
  }

  // ---------- Добавление платья ----------
  function handleCitySelectChange(selectId, customId) {
    const select = document.getElementById(selectId);
    const custom = document.getElementById(customId);
    custom.style.display = select.value === "Другой" ? "block" : "none";
  }

  function handleSizeSelectChange() {
    const select = document.getElementById("f-size-select");
    const custom = document.getElementById("f-size-custom");
    custom.style.display = select.value === "Другой" ? "block" : "none";
  }

  function checkVideoDuration(file) {
    return new Promise((resolve, reject) => {
      const video = document.createElement("video");
      video.preload = "metadata";
      video.onloadedmetadata = () => {
        URL.revokeObjectURL(video.src);
        if (video.duration > 15) {
          reject(new Error(`Видео длиной ${Math.round(video.duration)} сек — максимум 15 секунд`));
        } else {
          resolve();
        }
      };
      video.src = URL.createObjectURL(file);
    });
  }

  async function uploadToCloudinary(file, resourceType) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    const res = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`,
      { method: "POST", body: formData }
    );
    if (!res.ok) throw new Error("Не удалось загрузить файл в Cloudinary");
    const data = await res.json();
    return data.secure_url;
  }

  async function submitDress() {
    const statusEl = document.getElementById("add-status");
    const submitBtn = document.getElementById("submit-dress-btn");

    const title = document.getElementById("f-title").value;

    const sizeSelect = document.getElementById("f-size-select").value;
    const size = sizeSelect === "Другой" ? document.getElementById("f-size-custom").value : sizeSelect;

    const citySelect = document.getElementById("f-city-select").value;
    const city = citySelect === "Другой" ? document.getElementById("f-city-custom").value : citySelect;

    const occasions = Array.from(document.querySelectorAll(".f-occasion-cb:checked")).map(cb => cb.value);

    if (!title || !size || !city) {
      statusEl.innerHTML = `<div class="status-msg error">Заполни название, размер и город</div>`;
      return;
    }

    submitBtn.disabled = true;
    submitBtn.textContent = "Загружаем фото и видео...";
    statusEl.innerHTML = "";

    try {
      let videoUrl = null;
      const videoFile = document.getElementById("f-video").files[0];
      if (videoFile) {
        await checkVideoDuration(videoFile);
        videoUrl = await uploadToCloudinary(videoFile, "video");
      }

      const photoFiles = Array.from(document.getElementById("f-photos").files).slice(0, 5);
      const photoUrls = [];
      for (const file of photoFiles) {
        const url = await uploadToCloudinary(file, "image");
        photoUrls.push(url);
      }

      submitBtn.textContent = "Сохраняем...";

      const payload = {
        title,
        brand: document.getElementById("f-brand").value,
        size,
        city,
        occasions,
        price_3day: parseInt(document.getElementById("f-price3").value || "0"),
        price_week: parseInt(document.getElementById("f-price-week").value || "0"),
        extra_day_price: parseInt(document.getElementById("f-extra-day").value || "0"),
        deposit: parseInt(document.getElementById("f-deposit").value || "0"),
        description: document.getElementById("f-description").value,
        measurements: {},
        video_url: videoUrl,
        photo_urls: photoUrls
      };

      const res = await fetch(`${API_BASE}/dresses`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "Authorization": `Bearer ${authToken}`
        },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Ошибка отправки");
      statusEl.innerHTML = `<div class="status-msg ok">Платье отправлено на модерацию!</div>`;
      setTimeout(() => {
        document.getElementById("add-overlay").classList.remove("open");
        loadDresses();
      }, 1500);
    } catch (e) {
      statusEl.innerHTML = `<div class="status-msg error">${e.message}</div>`;
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = "Отправить на модерацию";
    }
  }
</script>

</body>
</html>
