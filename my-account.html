<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Личный кабинет — Keide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --ivory: #F7F2EC; --ink: #2A2320; --plum: #4B2E3A; --rose: #C98A9E;
    --gold: #AD8A50; --line: #E4DACD; --card-bg: #FFFFFF;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--ivory); color: var(--ink); font-family: 'Manrope', sans-serif; line-height: 1.5; }
  h1, h2, h3 { font-family: 'Fraunces', serif; font-weight: 500; }

  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 32px; border-bottom: 1px solid var(--line);
  }
  .logo { font-family: 'Fraunces', serif; font-size: 22px; font-weight: 600; color: var(--plum); }
  .logo span { color: var(--rose); }
  a.back-link { color: var(--plum); font-size: 14px; text-decoration: none; font-weight: 600; }

  main { max-width: 760px; margin: 0 auto; padding: 40px 24px; }
  h1 { font-size: 26px; color: var(--plum); margin-bottom: 24px; }
  h2 { font-size: 17px; color: var(--plum); margin-top: 32px; margin-bottom: 14px; }
  .subtitle-note { font-size: 13px; color: #8a7d74; margin-top: -8px; margin-bottom: 14px; }
  .field { margin-top: 12px; }
  .field label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #5a4f49; }
  .field input {
    width: 100%; padding: 10px 12px; border-radius: 10px; border: 1px solid var(--line);
    font-family: 'Manrope', sans-serif; font-size: 16px;
  }
  .status-msg { font-size: 13px; padding: 8px 10px; border-radius: 8px; }
  .status-msg.error { background: #FBEAEA; color: #A33A3A; }
  .status-msg.ok { background: #E9F3E7; color: #3A6B33; }

  .profile-card {
    background: #F0E7DB; border-radius: 12px; padding: 16px 18px; font-size: 14px;
  }
  .profile-card .name { font-weight: 700; font-size: 16px; }
  .profile-card .sub { color: #8a7d74; margin-top: 4px; }

  .booking-card {
    background: var(--card-bg); border: 1px solid var(--line); border-radius: 12px;
    padding: 16px; margin-bottom: 12px;
  }
  .booking-card .title { font-weight: 700; color: var(--plum); font-size: 16px; }
  .booking-card .meta { font-size: 13px; color: #8a7d74; margin-top: 4px; }

  .status-tag { display: inline-block; padding: 3px 10px; border-radius: 100px; font-size: 12px; font-weight: 600; margin-top: 8px; }
  .status-tag.pending { background: #FBF3E3; color: #9A7A2E; }
  .status-tag.payment_reported { background: #E3EEF9; color: #2E5A9A; }
  .status-tag.confirmed, .status-tag.picked_up, .status-tag.returned { background: #E9F3E7; color: #3A6B33; }
  .status-tag.cancelled, .status-tag.disputed { background: #FBEAEA; color: #A33A3A; }
  .status-tag.approved { background: #E9F3E7; color: #3A6B33; }
  .status-tag.not_submitted, .status-tag.rejected { background: #F0E7DB; color: #8a7d74; }

  .btn {
    font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 13px;
    padding: 8px 16px; border-radius: 100px; border: none; cursor: pointer;
    text-decoration: none; display: inline-block; margin-top: 10px; margin-right: 8px;
  }
  .btn-primary { background: var(--plum); color: var(--ivory); }
  .btn-whatsapp { background: #25D366; color: white; }
  .btn-telegram { background: #229ED9; color: white; }

  .empty-state { text-align: center; padding: 40px 20px; color: #8a7d74; }
  .contact-box { background: #F0E7DB; border-radius: 8px; padding: 10px; font-size: 13px; margin-top: 10px; }

  .account-tabs {
    display: flex; gap: 6px; border-bottom: 1px solid var(--line); margin: 16px 0 20px;
  }
  .account-tab {
    font-family: 'Manrope', sans-serif; font-weight: 600; font-size: 14px;
    padding: 10px 18px; border: none; background: none; color: #8a7d74; cursor: pointer;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .account-tab.active { color: var(--plum); border-bottom-color: var(--plum); }

  /* Строки "подпись: значение" внутри карточки брони */
  .booking-row {
    display: flex; justify-content: space-between; gap: 12px;
    font-size: 13px; margin-top: 6px;
  }
  .booking-row .lbl { color: #8a7d74; flex-shrink: 0; }
  .booking-row .val { font-weight: 600; text-align: right; }

  .overlay {
    position: fixed; inset: 0; background: rgba(43,35,32,0.45);
    display: none; align-items: center; justify-content: center; z-index: 200; padding: 20px;
  }
  .overlay.open { display: flex; }
  .modal {
    background: var(--card-bg); border-radius: 18px; max-width: 460px; width: 100%;
    max-height: 88vh; overflow-y: auto; padding: 28px;
  }

  .mobile-tabbar {
    display: none; position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--card-bg); border-top: 1px solid var(--line); z-index: 150;
    padding: 6px 0; padding-bottom: env(safe-area-inset-bottom, 6px);
  }
  .mobile-tabbar a {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 2px;
    color: #8a7d74; font-family: 'Manrope', sans-serif; font-size: 11px; padding: 6px 0; text-decoration: none;
  }
  .mobile-tabbar a.active { color: var(--plum); font-weight: 700; }
  .mobile-tabbar .icon { font-size: 20px; }

  @media (max-width: 760px) {
    header { padding: 14px 16px; }
    main { padding: 24px 16px; }
    .btn { width: 100%; text-align: center; margin-right: 0; }
    body { padding-bottom: 70px; }
    .mobile-tabbar { display: flex !important; }
  }
</style>
<script src="cities.js"></script>
</head>
<body>

<header>
  <div class="logo">Keide<span>.</span></div>
  <div style="display:flex; align-items:center; gap:12px;">
    <div id="auth-area"></div>
    <a href="index.html" class="back-link">← На главную</a>
  </div>
</header>

<!-- Модалка: соглашение при первом входе -->
<div class="overlay" id="terms-overlay">
  <div class="modal">
    <h2>Пользовательское соглашение</h2>
    <div style="margin-top:12px; padding:14px; background:#F0E7DB; border-radius:10px; font-size:13px; max-height:260px; overflow-y:auto;">
      <span id="terms-overlay-text"></span>
    </div>
    <div class="field" style="display:flex; align-items:flex-start; gap:8px; margin-top:14px;">
      <input type="checkbox" id="terms-overlay-checkbox" style="width:auto; margin-top:3px;">
      <label style="font-weight:400; font-size:13px;" for="terms-overlay-checkbox">Я прочитал(а) и принимаю условия</label>
    </div>
    <button class="btn btn-primary" style="margin-top:14px;" onclick="acceptTerms()">Продолжить</button>
    <div id="terms-overlay-status"></div>
  </div>
</div>

<!-- Модалка: реквизиты оплаты брони -->
<div class="overlay" id="payment-overlay">
  <div class="modal">
    <span class="close" onclick="document.getElementById('payment-overlay').classList.remove('open')" style="float:right; cursor:pointer; font-size:20px; color:#8a7d74; width:40px; height:40px; display:flex; align-items:center; justify-content:center; margin:-14px -14px 0 0;">✕</span>
    <div id="payment-overlay-content"></div>
  </div>
</div>

<main>
  <h1>Личный кабинет</h1>
  <div id="profile-summary"><div class="empty-state">Загружаем…</div></div>

  <h2>Данные для бронирования</h2>
  <p class="subtitle-note">Телефон и фото удостоверения нужны один раз, перед первой бронью — без этого забронировать платье нельзя.</p>
  <div id="renter-info-block"></div>

  <div id="partner-cabinet-block"></div>

  <h2>Мои брони</h2>
  <div id="bookings-list"><div class="empty-state">Загружаем…</div></div>
</main>

<script>
  const API_BASE = "https://dress-rental-api-production.up.railway.app";
  // TODO: замени на реальный номер Kaspi, куда должны приходить оплаты за прокат
  const KASPI_PAYMENT_PHONE = "+7 700 000 00 00";
  let authToken = localStorage.getItem("auth_token");
  const TELEGRAM_BOT_USERNAME = "dressrentkz_bot";

  const CLOUDINARY_CLOUD_NAME = "rf1r05uz";
  const CLOUDINARY_UPLOAD_PRESET = "y2bfmndr";

  async function uploadToCloudinary(file, resourceType) {
    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", CLOUDINARY_UPLOAD_PRESET);
    const res = await fetch(
      `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/${resourceType}/upload`,
      { method: "POST", body: formData }
    );
    if (!res.ok) throw new Error("Не удалось загрузить фото");
    const data = await res.json();
    return data.secure_url;
  }

  const STATUS_LABELS = {
    pending: "Ожидает оплаты",
    payment_reported: "Оплата на проверке",
    confirmed: "Подтверждено",
    picked_up: "Платье получено",
    returned: "Платье возвращено",
    disputed: "Спор",
    cancelled: "Отменено"
  };

  const PARTNER_STATUS_LABELS = {
    not_submitted: "не подана заявка",
    pending: "на проверке",
    approved: "одобрен",
    rejected: "отклонён"
  };

  // Строит ссылки на WhatsApp/Telegram из телефона и username
  // Приводит номер к формату 7XXXXXXXXXX для WhatsApp/Telegram-ссылок.
  // В Казахстане/России номер часто пишут с "8" в начале (внутренний код набора),
  // хотя международный код страны — "7". Если этого не поправить, WhatsApp
  // открывает чат по неверному номеру.
  function normalizePhoneDigits(phone) {
    let digits = phone.replace(/[^0-9]/g, "");
    if (digits.length === 11 && digits.startsWith("8")) {
      digits = "7" + digits.slice(1);
    } else if (digits.length === 10) {
      // Похоже, что номер введён без кода страны (напр. "700 123 45 67")
      digits = "7" + digits;
    }
    if (digits.length !== 11) {
      console.warn("Номер телефона не похож на казахстанский/российский формат:", phone);
    }
    return digits;
  }

  function buildMessengerLinks(phone, telegramUsername) {
    let html = "";
    if (phone) {
      const digits = normalizePhoneDigits(phone);
      html += `<a href="https://wa.me/${digits}" target="_blank" class="btn btn-whatsapp">Написать в WhatsApp</a>`;
    }
    if (telegramUsername) {
      html += `<a href="https://t.me/${telegramUsername}" target="_blank" class="btn btn-telegram">Написать в Telegram</a>`;
    }
    return html;
  }

  const TERMS_TEXT = `
    <strong>Публичная оферта сервиса Keide</strong><br><br>
    <strong>1. Предмет.</strong> Keide — онлайн-площадка, соединяющая владельцев платьев (наймодателей) и клиентов (нанимателей) для заключения договора имущественного найма (проката) согласно гл. 29 ГК РК. Сервис не является стороной договора проката и выступает посредником в бронировании и расчётах.<br><br>
    <strong>2. Бронирование и оплата.</strong> Бронь оформлена после полной оплаты (прокат + залог) переводом на реквизиты сервиса с кодом брони в комментарии. Неоплаченная бронь аннулируется через 20 минут. Минимальный срок проката — 3 дня.<br><br>
    <strong>3. Залог.</strong> Обеспечивает сохранность вещи и возвращается полностью после возврата платья в надлежащем состоянии. При повреждении, утрате или просрочке из залога удерживается сумма ущерба.<br><br>
    <strong>4. Наниматель обязан</strong> вернуть платье в срок в полученном состоянии (с учётом нормального износа), не передавать его третьим лицам, не производить чистку и переделку без согласования.<br><br>
    <strong>5. Владелец обязан</strong> предоставить вещь, соответствующую описанию и фото, в чистом и пригодном состоянии, и отвечает за достоверность описания.<br><br>
    <strong>6. Персональные данные</strong> обрабатываются согласно Закону РК «О персональных данных и их защите»: только для проверки личности, связи сторон и исполнения договора; третьим лицам, кроме второй стороны сделки, не передаются.<br><br>
    <strong>7. Споры</strong> разрешаются переговорами при посредничестве сервиса; при недостижении согласия — в порядке, установленном законодательством РК.<br><br>
    <strong>8. Акцепт.</strong> Регистрация и оформление брони означают полное принятие настоящих условий.
  `;

  function renderAuthArea() {
    const container = document.getElementById("auth-area");
    if (!container) return;
    if (authToken) {
      container.innerHTML = `<button class="btn btn-ghost" onclick="logout()">Выйти</button>`;
    } else {
      container.innerHTML = "";
    }
  }

  async function onTelegramAuth(user) {
    try {
      const res = await fetch(`${API_BASE}/auth/telegram-login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(user)
      });
      if (!res.ok) throw new Error("Ошибка входа");
      const data = await res.json();
      authToken = data.access_token;
      localStorage.setItem("auth_token", authToken);
      localStorage.setItem("user_id", data.user_id);
      renderMainContent();
    } catch (e) {
      alert("Не удалось войти через Telegram: " + e.message);
    }
  }

  function logout() {
    authToken = null;
    localStorage.removeItem("auth_token");
    localStorage.removeItem("user_id");
    renderMainContent();
  }

  function renderMainContent() {
    if (!authToken) {
      document.querySelector("main").innerHTML = `
        <h1>Личный кабинет</h1>
        <div style="text-align:center; padding:50px 20px;">
          <p style="color:#5a4f49; margin-bottom:20px;">Войди через Telegram, чтобы открыть личный кабинет</p>
          <div id="login-widget-slot" style="display:flex; justify-content:center; min-height:48px;"></div>
          <div id="login-loading" style="color:#8a7d74; font-size:13px; margin-top:10px;">Загружаем вход через Telegram…</div>
          <div id="login-slow-hint" style="color:#8a7d74; font-size:12px; margin-top:8px; display:none;">
            Кнопка грузится с серверов Telegram и иногда отвечает медленно.
            Если не появилась — обнови страницу.
          </div>
        </div>
      `;

      const slot = document.getElementById("login-widget-slot");
      const script = document.createElement("script");
      script.src = "https://telegram.org/js/telegram-widget.js?22";
      script.setAttribute("data-telegram-login", TELEGRAM_BOT_USERNAME);
      script.setAttribute("data-size", "large");
      script.setAttribute("data-onauth", "onTelegramAuth(user)");
      script.setAttribute("data-request-access", "write");
      script.async = true;

      // Скрипт загрузился — убираем надпись «загружаем»
      script.onload = () => {
        const loading = document.getElementById("login-loading");
        if (loading) loading.style.display = "none";
      };
      script.onerror = () => {
        const loading = document.getElementById("login-loading");
        if (loading) loading.textContent = "Не удалось загрузить вход через Telegram — обнови страницу";
      };

      slot.appendChild(script);

      // Если через 4 секунды кнопки всё ещё нет — подсказываем, что делать
      setTimeout(() => {
        const hint = document.getElementById("login-slow-hint");
        if (hint && !slot.querySelector("iframe")) hint.style.display = "block";
      }, 4000);

      renderAuthArea();
      return;
    }
    renderAuthArea();
    document.querySelector("main").innerHTML = `
      <h1>Личный кабинет</h1>

      <div class="account-tabs">
        <button class="account-tab active" data-tab="tab-profile" onclick="switchAccountTab('tab-profile')">Профиль</button>
        <button class="account-tab" data-tab="tab-bookings" onclick="switchAccountTab('tab-bookings')">Мои брони</button>
      </div>

      <div id="tab-profile" class="account-tab-content">
        <div id="profile-summary"><div class="empty-state">Загружаем…</div></div>

        <h2>Данные для бронирования</h2>
        <p class="subtitle-note">Телефон и фото удостоверения нужны один раз, перед первой бронью — без этого забронировать платье нельзя.</p>
        <div id="renter-info-block"></div>

        <div id="partner-cabinet-block"></div>
      </div>

      <div id="tab-bookings" class="account-tab-content" style="display:none;">
        <div id="bookings-list"><div class="empty-state">Загружаем…</div></div>
      </div>
    `;
    loadProfile();
    checkTerms();
  }

  let bookingsTabLoaded = false;

  function switchAccountTab(tabId) {
    document.querySelectorAll(".account-tab-content").forEach(el => el.style.display = "none");
    document.querySelectorAll(".account-tab").forEach(el => el.classList.remove("active"));
    document.getElementById(tabId).style.display = "block";
    document.querySelector(`.account-tab[data-tab="${tabId}"]`).classList.add("active");

    if (tabId === "tab-bookings" && !bookingsTabLoaded) {
      bookingsTabLoaded = true;
      loadBookings();
    }
  }

  async function checkTerms() {
    try {
      const res = await fetch(`${API_BASE}/users/me`, {
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      if (!res.ok) return;
      const profile = await res.json();
      if (!profile.agreed_to_terms) {
        document.getElementById("terms-overlay-text").innerHTML = TERMS_TEXT;
        document.getElementById("terms-overlay").classList.add("open");
      }
    } catch (e) {
      console.error("Не удалось проверить согласие", e);
    }
  }

  async function acceptTerms() {
    const checkbox = document.getElementById("terms-overlay-checkbox");
    const statusEl = document.getElementById("terms-overlay-status");
    if (!checkbox.checked) {
      statusEl.innerHTML = `<div class="status-msg error">Нужно поставить галочку, что ты прочитал(а) условия</div>`;
      return;
    }
    try {
      const res = await fetch(`${API_BASE}/users/me/accept-terms`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      if (!res.ok) throw new Error("Не удалось сохранить согласие");
      document.getElementById("terms-overlay").classList.remove("open");
    } catch (e) {
      statusEl.innerHTML = `<div class="status-msg error">${e.message}</div>`;
    }
  }

  renderAuthArea();
  renderMainContent();

  document.querySelectorAll(".overlay").forEach(overlay => {
    overlay.addEventListener("click", (e) => {
      if (e.target === overlay) overlay.classList.remove("open");
    });
  });

  async function loadProfile() {
    const container = document.getElementById("profile-summary");
    try {
      const res = await fetch(`${API_BASE}/users/me`, {
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      if (!res.ok) throw new Error("Не удалось загрузить профиль");
      const profile = await res.json();
      const partnerBadge = profile.verification_status !== "not_submitted"
        ? `<span class="status-tag ${profile.verification_status}">Партнёрство: ${PARTNER_STATUS_LABELS[profile.verification_status] || profile.verification_status}</span>`
        : "";
      container.innerHTML = `
        <div class="profile-card">
          <div class="name">${profile.full_name || "Имя не указано"}</div>
          <div class="sub">${profile.phone || "Телефон не указан"}</div>
          ${partnerBadge}
        </div>
      `;

      renderRenterInfoBlock(profile);

      const partnerBlock = document.getElementById("partner-cabinet-block");
      partnerBlock.innerHTML = profile.verification_status === "approved"
        ? `<a href="partner-cabinet.html" class="btn btn-primary" style="margin-top:10px;">Перейти в кабинет партнёра →</a>`
        : "";
    } catch (e) {
      container.innerHTML = `<div class="empty-state">${e.message}</div>`;
    }
  }

  let currentProfile = null;

  function renderRenterInfoBlock(profile) {
    currentProfile = profile;
    const block = document.getElementById("renter-info-block");
    const isComplete = profile.phone && profile.id_document_photo_url && profile.partner_city;
    const isPartner = profile.verification_status === "approved";

    if (isComplete) {
      block.innerHTML = `
        <div class="profile-card">
          <div>✅ Телефон: ${profile.phone}</div>
          <div style="margin-top:4px;">📍 Город: <strong>${profile.partner_city}</strong></div>
          ${isPartner ? `<div style="font-size:12px; color:#8a7d74; margin-top:4px;">Город партнёра меняет администратор — напиши в поддержку</div>` : ""}
          <div style="margin-top:8px;">
            <img src="${profile.id_document_photo_url}" style="width:70px; height:70px; object-fit:cover; border-radius:8px;">
          </div>
          <button class="btn btn-primary" style="margin-top:10px;" onclick="renderRenterInfoForm()">Изменить</button>
        </div>
      `;
    } else {
      renderRenterInfoForm();
    }
  }

  function renderRenterInfoForm() {
    const p = currentProfile || {};
    const hasPhoto = !!p.id_document_photo_url;
    const isPartner = p.verification_status === "approved";

    document.getElementById("renter-info-block").innerHTML = `
      <div class="profile-card">
        <div class="field">
          <label>Номер телефона</label>
          <input type="tel" id="r-phone" placeholder="+7 700 123 45 67" value="${p.phone || ""}">
        </div>
        <div class="field">
          <label>Город</label>
          <select id="r-city" ${isPartner && p.partner_city ? "disabled" : ""}></select>
          <div style="font-size:12px; color:#8a7d74; margin-top:4px;">
            ${isPartner && p.partner_city
              ? "Город партнёра меняет администратор — напиши в поддержку сервиса"
              : "По нему подберём платья, которые можно забрать рядом"}
          </div>
        </div>
        <div class="field">
          <label>Фото удостоверения личности</label>
          <input type="file" id="r-id-doc-photo" accept="image/*">
          ${hasPhoto ? `<div style="font-size:12px; color:#8a7d74; margin-top:4px;">Уже загружено — новый файл нужен, только если хочешь заменить</div>` : ""}
        </div>
        <button class="btn btn-primary" id="save-renter-info-btn" onclick="saveRenterInfo()">Сохранить</button>
        <div id="renter-info-status"></div>
      </div>
    `;

    fillCitySelect("r-city");
    if (p.partner_city) document.getElementById("r-city").value = p.partner_city;
  }

  async function saveRenterInfo() {
    const statusEl = document.getElementById("renter-info-status");
    const btn = document.getElementById("save-renter-info-btn");
    const phone = document.getElementById("r-phone").value;
    const citySelect = document.getElementById("r-city");
    // У партнёра поле заблокировано — берём город из профиля, иначе браузер вернёт пустое значение
    const city = citySelect.disabled ? (currentProfile?.partner_city || "") : citySelect.value;
    const file = document.getElementById("r-id-doc-photo").files[0];
    const existingPhoto = currentProfile?.id_document_photo_url;

    if (!phone || !city || (!file && !existingPhoto)) {
      statusEl.innerHTML = `<div class="status-msg error" style="margin-top:8px;">Заполни телефон, выбери город и прикрепи фото</div>`;
      return;
    }

    btn.disabled = true;
    btn.textContent = "Сохраняем...";
    try {
      // Новый файл грузим только если выбран, иначе оставляем прежнее фото
      const photoUrl = file ? await uploadToCloudinary(file, "image") : existingPhoto;
      const res = await fetch(`${API_BASE}/users/me/renter-info`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${authToken}` },
        body: JSON.stringify({ phone, city, id_document_photo_url: photoUrl })
      });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || "Не удалось сохранить");

      // Город пользователя — он же город каталога по умолчанию
      localStorage.setItem("keide_city", city);
      loadProfile();
    } catch (e) {
      statusEl.innerHTML = `<div class="status-msg error" style="margin-top:8px;">${e.message}</div>`;
    } finally {
      btn.disabled = false;
      btn.textContent = "Сохранить";
    }
  }

  let bookingsCache = [];
  let showFinishedBookings = false;

  async function loadBookings() {
    const list = document.getElementById("bookings-list");
    try {
      const res = await fetch(`${API_BASE}/bookings/my`, {
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      if (!res.ok) throw new Error("Не удалось загрузить брони");
      bookingsCache = await res.json();
      renderBookings();
    } catch (e) {
      list.innerHTML = `<div class="empty-state">${e.message}</div>`;
    }
  }

  function toggleFinishedBookings() {
    showFinishedBookings = !showFinishedBookings;
    renderBookings();
  }

  function renderBookings() {
    const list = document.getElementById("bookings-list");
    if (!bookingsCache.length) {
      list.innerHTML = `<div class="empty-state">У тебя пока нет броней. <a href="catalog.html">Смотреть каталог →</a></div>`;
      return;
    }

    // Активные — сверху и всегда видны; завершённые и отменённые — под кнопкой
    const finishedStatuses = ["returned", "cancelled"];
    const active = bookingsCache.filter(b => !finishedStatuses.includes(b.status));
    const finished = bookingsCache.filter(b => finishedStatuses.includes(b.status));

    active.sort((a, b) => new Date(b.date_from) - new Date(a.date_from));
    finished.sort((a, b) => new Date(b.date_from) - new Date(a.date_from));

    // Переводит "2026-07-18" в "18 июля"
    const MONTHS = ["января","февраля","марта","апреля","мая","июня","июля","августа","сентября","октября","ноября","декабря"];
    const humanDate = (iso) => {
      const [y, m, d] = iso.split("-").map(Number);
      return `${d} ${MONTHS[m - 1]}`;
    };

    const renderCard = (b) => {
      const canSeeContact = ["confirmed", "picked_up", "returned"].includes(b.status);
      return `
        <div class="booking-card">
          <div style="display:flex; gap:12px; align-items:flex-start;">
            ${b.dress_photo
              ? `<img src="${b.dress_photo.replace('/upload/', '/upload/w_120,h_120,c_fill,q_auto/')}" loading="lazy" style="width:60px; height:60px; object-fit:cover; border-radius:10px; flex-shrink:0;">`
              : `<div style="width:60px; height:60px; border-radius:10px; background:#F0E7DB; flex-shrink:0;"></div>`}
            <div style="flex:1;">
              <div class="title">${b.dress_title || `Платье #${b.dress_id}`}</div>
              <span class="status-tag ${b.status}" style="margin-top:4px;">${STATUS_LABELS[b.status] || b.status}</span>
            </div>
          </div>
          <div class="booking-row"><span class="lbl">Период проката</span><span class="val">${humanDate(b.date_from)} — ${humanDate(b.date_to)}</span></div>
          <div class="booking-row"><span class="lbl">Стоимость проката</span><span class="val">${b.total_price.toLocaleString("ru-RU")} ₸</span></div>
          ${b.deposit_held > 0 ? `<div class="booking-row"><span class="lbl">Залог (вернётся после сдачи)</span><span class="val">${b.deposit_held.toLocaleString("ru-RU")} ₸</span></div>` : ""}
          <div id="contact-${b.id}"></div>
          ${b.status === "pending" ? `<button class="btn btn-primary" onclick="showPaymentScreenById(${b.id})">Показать реквизиты оплаты</button>` : ""}
          ${canSeeContact ? `<button class="btn btn-primary" onclick="loadContact(${b.id})">Показать контакты владельца</button>` : ""}
        </div>
      `;
    };

    let html = "";
    if (active.length) {
      html += active.map(renderCard).join("");
    } else {
      html += `<div class="empty-state" style="padding:16px;">Активных броней нет.</div>`;
    }

    if (finished.length) {
      html += `
        <div style="text-align:center; margin-top:14px;">
          <a onclick="toggleFinishedBookings()" style="cursor:pointer; color:var(--plum); font-weight:600; font-size:13px;">
            ${showFinishedBookings ? "Скрыть завершённые" : `Показать завершённые (${finished.length})`}
          </a>
        </div>
      `;
      if (showFinishedBookings) {
        html += `<div style="margin-top:10px; opacity:0.75;">${finished.map(renderCard).join("")}</div>`;
      }
    }

    list.innerHTML = html;
  }

  // Показывает экран "переведи деньги" — можно открыть повторно в любой момент,
  // пока бронь не оплачена и не сгорела по таймеру
  function showPaymentScreenById(bookingId) {
    const booking = bookingsCache.find(b => b.id === bookingId);
    if (booking) showPaymentScreen(booking);
  }

  function showPaymentScreen(booking) {
    const content = document.getElementById("payment-overlay-content");
    const orderCode = String(booking.id);
    const deposit = booking.deposit_held || 0;
    const totalToPay = booking.total_price + deposit;
    const expiresDate = new Date(booking.expires_at);
    const expiresText = expiresDate.toLocaleString("ru-RU", { hour: "2-digit", minute: "2-digit", day: "2-digit", month: "2-digit" });

    content.innerHTML = `
      <h2>Оплати бронь</h2>
      <div style="margin-top:10px; color:#5a4f49; font-size:14px;">
        <div>Аренда: ${booking.total_price.toLocaleString("ru-RU")} ₸</div>
        ${deposit > 0 ? `<div>Залог (вернём после сдачи платья): ${deposit.toLocaleString("ru-RU")} ₸</div>` : ""}
      </div>
      <p style="margin-top:10px; color:#5a4f49;">
        Переведи <strong>${totalToPay.toLocaleString("ru-RU")} ₸</strong> на Kaspi по номеру:
      </p>
      <div style="background:#F0E7DB; border-radius:10px; padding:14px; margin-top:10px; font-size:18px; font-weight:700; color:var(--plum); text-align:center;">
        ${KASPI_PAYMENT_PHONE}
      </div>
      <p style="margin-top:14px; color:#5a4f49;">
        В комментарии к переводу обязательно укажи код брони (только цифры):
      </p>
      <div style="background:#F0E7DB; border-radius:10px; padding:14px; margin-top:6px; font-size:18px; font-weight:700; color:var(--plum); text-align:center;">
        ${orderCode}
      </div>
      <p style="margin-top:14px; font-size:13px; color:#A33A3A;">
        Бронь действует до ${expiresText} — если не оплатить до этого времени, даты освободятся автоматически.
      </p>
      <button class="btn btn-primary" style="margin-top:14px;" onclick="reportPaid(${booking.id})">Я оплатил(а)</button>
      <div id="payment-overlay-status"></div>
    `;
    document.getElementById("payment-overlay").classList.add("open");
  }

  async function reportPaid(bookingId) {
    const statusEl = document.getElementById("payment-overlay-status");
    try {
      const res = await fetch(`${API_BASE}/bookings/${bookingId}/mark-paid`, {
        method: "POST",
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Не получилось отметить оплату");
      document.getElementById("payment-overlay-content").innerHTML = `
        <h2>Спасибо!</h2>
        <p style="margin-top:10px; color:#5a4f49;">Мы проверим оплату и подтвердим бронь.</p>
      `;
      loadBookings();
    } catch (e) {
      statusEl.innerHTML = `<div class="status-msg error">${e.message}</div>`;
    }
  }

  async function loadContact(bookingId) {
    const container = document.getElementById(`contact-${bookingId}`);
    try {
      const res = await fetch(`${API_BASE}/bookings/${bookingId}/contact`, {
        headers: { "Authorization": `Bearer ${authToken}` }
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || "Контакты пока недоступны");
      container.innerHTML = `
        <div class="contact-box">
          <div>${data.owner_name || "Владелец"}: ${data.owner_phone || "телефон не указан"}</div>
          <div>${buildMessengerLinks(data.owner_phone, data.owner_telegram_username)}</div>
        </div>
      `;
    } catch (e) {
      container.innerHTML = `<div class="contact-box" style="color:#A33A3A;">${e.message}</div>`;
    }
  }
</script>
